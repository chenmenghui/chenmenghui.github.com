          <p>就是拼接字符串,类似于csv格式.不过需要注意header头</p>
<p>拼接成如下格式的字符串<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">(id)\t(title)\t(content)\t(status)\t\n</span><br><span class="line">(1)\t(title)\t\(content)\t(1)\t\n</span><br></pre></td></tr></table></figure></p>
<figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;?php</span></span><br><span class="line">header(<span class="string">"Content-Type:application/vnd.ms-excel"</span>);</span><br><span class="line">header(<span class="string">"Content-Disposition:attachment;filename=test.xls"</span>);</span><br><span class="line"></span><br><span class="line">$head = [<span class="string">'id'</span>, <span class="string">'title'</span>, <span class="string">'content'</span>, <span class="string">'status'</span>];</span><br><span class="line">$body = [</span><br><span class="line">    [<span class="number">1</span>, <span class="string">'title'</span>, <span class="string">'content'</span>, <span class="number">1</span>],</span><br><span class="line">    [<span class="number">2</span>, <span class="string">'title'</span>, <span class="string">'content'</span>, <span class="number">2</span>],</span><br><span class="line">    [<span class="number">3</span>, <span class="string">'title'</span>, <span class="string">'content'</span>, <span class="number">3</span>]</span><br><span class="line">];</span><br><span class="line"></span><br><span class="line">array_unshift($body, $head);</span><br><span class="line"></span><br><span class="line">$table = array_map(<span class="function"><span class="keyword">function</span> <span class="params">($row)</span> </span>&#123;</span><br><span class="line">   <span class="keyword">return</span> implode(<span class="string">"\t"</span>, $row) ;</span><br><span class="line">&#125;, $body);</span><br><span class="line">$table = implode(<span class="string">"\n"</span>, $table);</span><br><span class="line"></span><br><span class="line"><span class="keyword">echo</span> iconv(<span class="string">'utf-8'</span>, <span class="string">'gbk//TRANSLIT'</span>, $table);</span><br></pre></td></tr></table></figure>

<script>
  var isDown = true
  var oldY = 0
  inView.offset(50)

  document.body.addEventListener('touchstart', function(){});
  
  window.addEventListener('scroll', _.throttle(e => {
    var currentY = window.scrollY
    if((oldY - currentY) < 0) {
      isDown = true
    } else {
      isDown = false
    }
    oldY = currentY
  }, 250))

  $("article img").each(function() {
      var strA = "<a data-fancybox='gallery' href='" + this.src + "'></a>";
      $(this).wrapAll(strA);
  });

  $('.toc-link').each(function() {
      var href = $(this).attr("href");
      
      inView(href).on('exit', () => {
        if (isDown) {
          handleActive(href)
        }
      })

      inView(href).on('enter', () => {
        if (!isDown) {
          handleActive(href)
        }
      })

      this.onclick = function(e) {
        var pos = $(href).offset().top - 10;
        $("html,body").animate({scrollTop: pos}, 300);
        setTimeout(() => {
          handleActive(href)
        }, 350)
        return false
      }
  })

  function handleActive(href) {
    document.querySelectorAll('.toc-link').forEach(elm => {
      elm.classList.remove('active')
    })
    document.querySelector(".toc [href='"+ href +"']").classList.add('active')
  }
</script>
<script src="../../../../../../../lib/jquery.fancybox.min.js"></script>
