          <h1 id="strtotime"><a href="#strtotime" class="headerlink" title="strtotime()"></a>strtotime()</h1><p><a href="https://blog.csdn.net/ihelloworld/article/details/7699730?utm_medium=distribute.pc_relevant_t0.none-task-blog-BlogCommendFromMachineLearnPai2-1.compare&amp;depth_1-utm_source=distribute.pc_relevant_t0.none-task-blog-BlogCommendFromMachineLearnPai2-1.compare" target="_blank" rel="noopener">php 获取时间(今天,昨天,三天内,本周,上周,本月,三年内,半年内,一年内,三年内)</a></p>
<figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">define(<span class="string">'DATE_FORMAT'</span>, <span class="string">'Y-m-d'</span>);</span><br><span class="line">$year = <span class="number">2020</span>;</span><br><span class="line">$baseStamp = strtotime($year . <span class="string">"-01-01"</span>);</span><br><span class="line">$weekNo = <span class="number">31</span>;</span><br><span class="line">$days = ($weekNo - <span class="number">1</span>) * <span class="number">7</span>;</span><br><span class="line">$resWeek[] = date(DATE_FORMAT, strtotime(<span class="string">"+ &#123;$days&#125; day Monday"</span>, $baseStamp));</span><br><span class="line">$resWeek[] = date(DATE_FORMAT, strtotime(<span class="string">"+ &#123;$days&#125; day tuesday"</span>, $baseStamp));</span><br><span class="line">$resWeek[] = date(DATE_FORMAT, strtotime(<span class="string">"+ &#123;$days&#125; day wednesday"</span>, $baseStamp));</span><br><span class="line">$resWeek[] = date(DATE_FORMAT, strtotime(<span class="string">"+ &#123;$days&#125; day thursday"</span>, $baseStamp));</span><br><span class="line">$resWeek[] = date(DATE_FORMAT, strtotime(<span class="string">"+ &#123;$days&#125; day friday"</span>, $baseStamp));</span><br><span class="line">$resWeek[] = date(DATE_FORMAT, strtotime(<span class="string">"+ &#123;$days&#125; day saturday"</span>, $baseStamp));</span><br><span class="line">$resWeek[] = date(DATE_FORMAT, strtotime(<span class="string">"+ &#123;$days&#125; day sunday"</span>, $baseStamp));</span><br></pre></td></tr></table></figure>
<p>注意：strtotim 的「本周」指的是从今天开始算的后七天内，比如上述代码的周二结果是2020-08-04而不是2020-07-28。搭配「last」、「next」使用效果不错。</p>

<script src="../../../../../../lib/in-view.min.js"></script>
<script src="../../../../../../lib/lodash.min.js"></script>
<script>
  var isDown = true
  var oldY = 0
  inView.offset(50)

  document.body.addEventListener('touchstart', function(){});
  
  window.addEventListener('scroll', _.throttle(e => {
    var currentY = window.scrollY
    if((oldY - currentY) < 0) {
      isDown = true
    } else {
      isDown = false
    }
    oldY = currentY
  }, 250))

  $("article img").each(function() {
      var strA = "<a data-fancybox='gallery' href='" + this.src + "'></a>";
      $(this).wrapAll(strA);
  });

  $('.toc-link').each(function() {
      var href = $(this).attr("href");
      
      inView(href).on('exit', () => {
        if (isDown) {
          handleActive(href)
        }
      })

      inView(href).on('enter', () => {
        if (!isDown) {
          handleActive(href)
        }
      })

      this.onclick = function(e) {
        var pos = $(href).offset().top - 10;
        $("html,body").animate({scrollTop: pos}, 300);
        setTimeout(() => {
          handleActive(href)
        }, 350)
        return false
      }
  })

  function handleActive(href) {
    document.querySelectorAll('.toc-link').forEach(elm => {
      elm.classList.remove('active')
    })
    document.querySelector(".toc [href='"+ href +"']").classList.add('active')
  }
</script>
