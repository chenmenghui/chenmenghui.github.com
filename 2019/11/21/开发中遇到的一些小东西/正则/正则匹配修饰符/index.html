          <figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> str = <span class="string">'frm_schedule[4][ForceArrangeInsideSeason]'</span>;</span><br><span class="line"><span class="keyword">var</span> regex = <span class="regexp">/frm_schedule\[(\d+?)\]\[(\w+?)\]/i</span>; <span class="comment">// #1</span></span><br><span class="line"><span class="keyword">if</span> (frmname = str.match(regex)) &#123;</span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">"frmname"</span>, frmname);</span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">"parseInt(frmname[1])"</span>, <span class="built_in">parseInt</span>(frmname[<span class="number">1</span>]));</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<table>
<thead>
<tr>
<th>修饰符</th>
<th>描述</th>
</tr>
</thead>
<tbody>
<tr>
<td>g</td>
<td>执行全局匹配（查找所有匹配而非是在找到第一个匹配时停止</td>
</tr>
<tr>
<td>m</td>
<td>执行多行匹配</td>
</tr>
<tr>
<td>i</td>
<td>执行对大小写不敏感的匹配</td>
</tr>
</tbody>
</table>
<p>其中，使用g的话，例中结果是<br><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// g:</span></span><br><span class="line"><span class="built_in">Array</span> [ <span class="string">"frm_schedule[4][ForceArrangeInsideSeason]"</span> ]</span><br><span class="line"><span class="comment">// 其他</span></span><br><span class="line"><span class="built_in">Array</span>(<span class="number">3</span>) [ <span class="string">"frm_schedule[4][ForceArrangeInsideSeason]"</span>, <span class="string">"4"</span>, <span class="string">"ForceArrangeInsideSeason"</span> ]</span><br></pre></td></tr></table></figure></p>

<script src="../../../../../../lib/in-view.min.js"></script>
<script src="../../../../../../lib/lodash.min.js"></script>
<script>
  var isDown = true
  var oldY = 0
  inView.offset(50)

  document.body.addEventListener('touchstart', function(){});
  
  window.addEventListener('scroll', _.throttle(e => {
    var currentY = window.scrollY
    if((oldY - currentY) < 0) {
      isDown = true
    } else {
      isDown = false
    }
    oldY = currentY
  }, 250))

  $("article img").each(function() {
      var strA = "<a data-fancybox='gallery' href='" + this.src + "'></a>";
      $(this).wrapAll(strA);
  });

  $('.toc-link').each(function() {
      var href = $(this).attr("href");
      
      inView(href).on('exit', () => {
        if (isDown) {
          handleActive(href)
        }
      })

      inView(href).on('enter', () => {
        if (!isDown) {
          handleActive(href)
        }
      })

      this.onclick = function(e) {
        var pos = $(href).offset().top - 10;
        $("html,body").animate({scrollTop: pos}, 300);
        setTimeout(() => {
          handleActive(href)
        }, 350)
        return false
      }
  })

  function handleActive(href) {
    document.querySelectorAll('.toc-link').forEach(elm => {
      elm.classList.remove('active')
    })
    document.querySelector(".toc [href='"+ href +"']").classList.add('active')
  }
</script>
<script src="../../../../../../lib/jquery.fancybox.min.js"></script>
