<h3 id="时序图"><a href="#时序图" class="headerlink" title="时序图"></a>时序图</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br></pre></td><td class="code"><pre><span class="line">@startuml</span><br><span class="line">participant &quot;用户&quot; as user</span><br><span class="line">participant &quot;微信APP&quot; as app</span><br><span class="line">participant &quot;商户后台&quot; as background</span><br><span class="line">participant &quot;微信支付系统&quot; as pay_system</span><br><span class="line">actor user</span><br><span class="line">entity app</span><br><span class="line">entity background</span><br><span class="line">entity pay_system</span><br><span class="line"></span><br><span class="line">activate background</span><br><span class="line">    background-&gt;background: 生成订单</span><br><span class="line">    activate background</span><br><span class="line">        background-&gt;pay_system: 调统一下单API</span><br><span class="line">            activate pay_system</span><br><span class="line">                pay_system-&gt;pay_system: 生成预支付交易</span><br><span class="line">                activate pay_system</span><br><span class="line">                deactivate pay_system</span><br><span class="line">                return: 返回预支付交易链接</span><br><span class="line">            deactivate pay_system</span><br><span class="line">        background-&gt;background: 将支付交易链接转化成二维码</span><br><span class="line">        activate background</span><br><span class="line">        deactivate background</span><br><span class="line">    deactivate background</span><br><span class="line">    background--&gt;user: 把二维码展示给用户</span><br><span class="line">deactivate background</span><br><span class="line"></span><br><span class="line">activate user</span><br><span class="line">    user-&gt;app: 用户打开微信扫一扫</span><br><span class="line">    activate app</span><br><span class="line">        app-&gt;pay_system: 提交扫描链接</span><br><span class="line">        activate pay_system</span><br><span class="line">            pay_system-&gt;pay_system: 验证链接是否有效</span><br><span class="line">            activate pay_system</span><br><span class="line">            deactivate pay_system</span><br><span class="line">            return 返回需要支付授权</span><br><span class="line">        deactivate pay_system</span><br><span class="line">    deactivate app</span><br><span class="line">    user-&gt;app: 用户确认支付，输入密码</span><br><span class="line">deactivate user</span><br><span class="line"></span><br><span class="line">activate app</span><br><span class="line">    app-&gt;pay_system: 提交支付授权</span><br><span class="line">    activate pay_system</span><br><span class="line">        pay_system-&gt;pay_system: 验证支付授权，完成交易</span><br><span class="line">        activate pay_system</span><br><span class="line">        deactivate pay_system</span><br><span class="line">        alt 并行处理</span><br><span class="line">            pay_system--&gt;background: 返回支付结果，发送短信和消息提示</span><br><span class="line">    deactivate pay_system</span><br><span class="line">deactivate app</span><br><span class="line"></span><br><span class="line">            pay_system-&gt;background: 异步通知商户后台支付结果</span><br><span class="line">            activate pay_system</span><br><span class="line">            activate background</span><br><span class="line">            note right: 这里不知道怎么回事，\n必须放在activate pay_system上面</span><br><span class="line">            background--&gt;pay_system: 告知支付结果接受情况</span><br><span class="line">            deactivate background</span><br><span class="line">            deactivate pay_system</span><br><span class="line"></span><br><span class="line">            alt 判断支付状态</span><br><span class="line">            background-&gt;pay_system:调用查询订单API</span><br><span class="line">            activate background</span><br><span class="line">                activate pay_system</span><br><span class="line">                    return 返回支付状态</span><br><span class="line">                deactivate background</span><br><span class="line">            deactivate background</span><br><span class="line">            end alt</span><br><span class="line">        end alt</span><br><span class="line"></span><br><span class="line">activate background</span><br><span class="line">background-&gt;background: 发货等操作</span><br><span class="line">deactivate background</span><br><span class="line">@enduml</span><br></pre></td></tr></table></figure>

<script src="../../../../../../lib/in-view.min.js"></script>
<script src="../../../../../../lib/lodash.min.js"></script>
<script>
  var isDown = true
  var oldY = 0
  inView.offset(50)

  document.body.addEventListener('touchstart', function(){});
  
  window.addEventListener('scroll', _.throttle(e => {
    var currentY = window.scrollY
    if((oldY - currentY) < 0) {
      isDown = true
    } else {
      isDown = false
    }
    oldY = currentY
  }, 250))

  $("article img").each(function() {
      var strA = "<a data-fancybox='gallery' href='" + this.src + "'></a>";
      $(this).wrapAll(strA);
  });

  $('.toc-link').each(function() {
      var href = $(this).attr("href");
      
      inView(href).on('exit', () => {
        if (isDown) {
          handleActive(href)
        }
      })

      inView(href).on('enter', () => {
        if (!isDown) {
          handleActive(href)
        }
      })

      this.onclick = function(e) {
        var pos = $(href).offset().top - 10;
        $("html,body").animate({scrollTop: pos}, 300);
        setTimeout(() => {
          handleActive(href)
        }, 350)
        return false
      }
  })

  function handleActive(href) {
    document.querySelectorAll('.toc-link').forEach(elm => {
      elm.classList.remove('active')
    })
    document.querySelector(".toc [href='"+ href +"']").classList.add('active')
  }
</script>
