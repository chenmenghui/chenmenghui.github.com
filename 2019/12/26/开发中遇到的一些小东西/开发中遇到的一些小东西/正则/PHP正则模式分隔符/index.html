          <p><a href="https://www.php.net/manual/zh/regexp.reference.delimiters.php" target="_blank" rel="noopener">分隔符</a></p>
<p>说起来这个不是什么特别重要的东西，但不知道我为什么会在乎这个</p>
<figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// Another rule</span></span><br><span class="line">$aPatternMode2[<span class="string">'tasksetid'</span>] = <span class="string">"&lt;input.*?name=\"unitinfo\[(?&lt;unitinfoid&gt;\d+)\]\[tasksetid\]\[(?&lt;key&gt;\d+)\]\".*?value=\"(?&lt;value&gt;.*?)\".*?&gt;"</span>;</span><br><span class="line">$aPatternMode2[<span class="string">'islost'</span>] = <span class="string">"&lt;input.*?name=\"unitinfo\[(?&lt;unitinfoid&gt;\d+)\]\[islost\]\[(?&lt;key&gt;\d+)\]\".*?value=\"(?&lt;value&gt;.*?)\".*?&gt;"</span>;</span><br><span class="line">$aPatternMode2[<span class="string">'sequenceOrder'</span>] = <span class="string">"&lt;input.*?name=\"unitinfo\[(?&lt;unitinfoid&gt;\d+)\]\[sequenceOrder\]\[(?&lt;key&gt;\d+)\]\".*?value=\"(?&lt;value&gt;.*?)\".*?&gt;"</span>;</span><br><span class="line">$aPatternMode2[<span class="string">'schedule_set_id'</span>] = <span class="string">"&lt;input.*?name=\"unitinfo\[(?&lt;unitinfoid&gt;\d+)\]\[schedule_set_id\]\[(?&lt;key&gt;\d+)\]\".*?value=\"(?&lt;value&gt;.*?)\".*?&gt;"</span>;</span><br><span class="line"><span class="keyword">foreach</span> ($aPatternMode2 <span class="keyword">as</span> $key =&gt; $pattern) &#123;</span><br><span class="line">    <span class="keyword">if</span> (preg_match_all($pattern, $sContent, $match, PREG_SET_ORDER)) &#123;</span><br><span class="line">        <span class="keyword">foreach</span> ($match <span class="keyword">as</span> $matchItem) &#123;</span><br><span class="line">            $aUnitinfo[$matchItem[<span class="string">'unitinfoid'</span>]][$key][$matchItem[<span class="string">'key'</span>]] = $matchItem[<span class="string">'value'</span>];</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<p>像这样，分隔符就别的可有可无了。我也是无意间发现的。</p>
<p>明明是一件不重要的事情，可就是让我如鲠在喉。<br>其实我是模式修饰符用的不多，这个分隔符加在模式和<a href="https://www.php.net/manual/zh/reference.pcre.pattern.modifiers.php" target="_blank" rel="noopener">修饰符</a>之间的，是相当有用的。</p>

<script src="../../../../../../../lib/in-view.min.js"></script>
<script src="../../../../../../../lib/lodash.min.js"></script>
<script>
  var isDown = true
  var oldY = 0
  inView.offset(50)

  document.body.addEventListener('touchstart', function(){});
  
  window.addEventListener('scroll', _.throttle(e => {
    var currentY = window.scrollY
    if((oldY - currentY) < 0) {
      isDown = true
    } else {
      isDown = false
    }
    oldY = currentY
  }, 250))

  $("article img").each(function() {
      var strA = "<a data-fancybox='gallery' href='" + this.src + "'></a>";
      $(this).wrapAll(strA);
  });

  $('.toc-link').each(function() {
      var href = $(this).attr("href");
      
      inView(href).on('exit', () => {
        if (isDown) {
          handleActive(href)
        }
      })

      inView(href).on('enter', () => {
        if (!isDown) {
          handleActive(href)
        }
      })

      this.onclick = function(e) {
        var pos = $(href).offset().top - 10;
        $("html,body").animate({scrollTop: pos}, 300);
        setTimeout(() => {
          handleActive(href)
        }, 350)
        return false
      }
  })

  function handleActive(href) {
    document.querySelectorAll('.toc-link').forEach(elm => {
      elm.classList.remove('active')
    })
    document.querySelector(".toc [href='"+ href +"']").classList.add('active')
  }
</script>
