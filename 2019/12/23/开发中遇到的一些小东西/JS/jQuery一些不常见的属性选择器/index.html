          <h3 id="jQuery获取属性名带特殊符号的dom"><a href="#jQuery获取属性名带特殊符号的dom" class="headerlink" title="jQuery获取属性名带特殊符号的dom"></a>jQuery获取属性名带特殊符号的dom</h3><p>像<br><figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">input</span> <span class="attr">value</span>=<span class="string">"2"</span> <span class="attr">name</span>=<span class="string">"frm_schedule[2][ScheduleMethod]"</span> <span class="attr">type</span>=<span class="string">"radio"</span> <span class="attr">id</span>=<span class="string">"frm_schedule[2][ScheduleMethod]"</span>&gt;</span></span><br></pre></td></tr></table></figure></p>
<p>这个，使用<br><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">console</span>.log($(<span class="string">'#frm_schedule[2][ScheduleMethod]'</span>).attr(<span class="string">'id'</span>));</span><br></pre></td></tr></table></figure></p>
<p>是获取不到值的<br>使用<br><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">console</span>.log($(<span class="string">'input[id="frm_schedule[2][ScheduleMethod]"]'</span>).attr(<span class="string">'id'</span>));</span><br></pre></td></tr></table></figure></p>
<p>才行~~~</p>
<h3 id="使用正则"><a href="#使用正则" class="headerlink" title="使用正则"></a>使用正则</h3><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> _select = $(<span class="keyword">this</span>).find(<span class="string">'select[id^="frm_schedule"][id$="\[Point\]"]'</span>);</span><br></pre></td></tr></table></figure>
<p>注意其中 id 的值「^=」和「$=」同时匹配 id 的头和尾。即「且」的关系。</p>
<p>如果写成</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> _select = $(<span class="keyword">this</span>).find(<span class="string">'select[id^="frm_schedule"],[id$="\[Point\]"]'</span>);</span><br></pre></td></tr></table></figure>
<p>这就是「或」的关系</p>

<script src="https://cdn.bootcss.com/jquery/3.2.1/jquery.min.js"></script>
<script src="../../../../../../lib/in-view.min.js"></script>
<script src="../../../../../../lib/lodash.min.js"></script>
<script>
  var isDown = true
  var oldY = 0
  inView.offset(50)

  document.body.addEventListener('touchstart', function(){});
  
  window.addEventListener('scroll', _.throttle(e => {
    var currentY = window.scrollY
    if((oldY - currentY) < 0) {
      isDown = true
    } else {
      isDown = false
    }
    oldY = currentY
  }, 250))

  $("article img").each(function() {
      var strA = "<a data-fancybox='gallery' href='" + this.src + "'></a>";
      $(this).wrapAll(strA);
  });

  $('.toc-link').each(function() {
      var href = $(this).attr("href");
      
      inView(href).on('exit', () => {
        if (isDown) {
          handleActive(href)
        }
      })

      inView(href).on('enter', () => {
        if (!isDown) {
          handleActive(href)
        }
      })

      this.onclick = function(e) {
        var pos = $(href).offset().top - 10;
        $("html,body").animate({scrollTop: pos}, 300);
        setTimeout(() => {
          handleActive(href)
        }, 350)
        return false
      }
  })

  function handleActive(href) {
    document.querySelectorAll('.toc-link').forEach(elm => {
      elm.classList.remove('active')
    })
    document.querySelector(".toc [href='"+ href +"']").classList.add('active')
  }
</script>
<script src="../../../../../../lib/jquery.fancybox.min.js"></script>
